 <!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Météo — Station Live STI2D</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary-dark: #0a1628;
            --primary-blue: #1e3a5f;
            --accent-gold: #d4af37;
            --text-light: #e8edf2;
            --text-muted: #98a8b8;
            --card-bg: rgba(30, 58, 95, 0.3);
            --glass-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Barlow', sans-serif;
            background: linear-gradient(135deg, #0a1628 0%, #1e3a5f 50%, #2d5a8c 100%);
            color: var(--text-light);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .grain {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.03; pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' /%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' /%3E%3C/svg%3E");
            z-index: 1;
        }

        header {
            position: relative; z-index: 10;
            padding: 2rem 5%;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            backdrop-filter: blur(10px);
            background: var(--glass-bg);
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem; font-weight: 900;
            background: linear-gradient(135deg, var(--accent-gold), #f4e4b3);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        main { position: relative; z-index: 10; max-width: 1400px; margin: 0 auto; padding: 3rem 5%; }

        .hero-section { text-align: center; padding: 2rem 0; }
        .location-name { font-family: 'Playfair Display', serif; font-size: 4rem; margin-bottom: 1rem; }
        
        .current-weather {
            display: flex; justify-content: center; align-items: center;
            gap: 4rem; margin-bottom: 4rem;
        }

        .weather-icon-large { font-size: 10rem; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-20px); } }

        .temperature { font-size: 8rem; font-weight: 300; }
        .weather-description { font-size: 2rem; color: var(--accent-gold); text-transform: capitalize; }

        .weather-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
        }

        .detail-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            transition: 0.3s;
        }

        .detail-label { font-size: 0.9rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 1rem; }
        .detail-value { font-size: 2.5rem; font-weight: 600; }

        .uv-bar-container {
            height: 14px;
            margin-top: 15px;
            border: 2px solid white;
            border-radius: 10px;
            padding: 2px;
            background: rgba(0,0,0,0.2);
        }
        .uv-fill {
            height: 100%; width: 0%;
            border-radius: 5px;
            background: linear-gradient(90deg, #22c55e, #eab308, #f97316, #ef4444, #a855f7);
            transition: width 1s ease-in-out;
        }

        footer { text-align: center; padding: 3rem; border-top: 1px solid rgba(212, 175, 55, 0.2); margin-top: 4rem; color: var(--text-muted); }
    </style>
</head>
<body>
    <div class="grain"></div>
    
    <header>
        <div class="nav-container" style="display:flex; justify-content:center;">
            <div class="logo">MÉTÉO CONNECTÉE</div>
        </div>
    </header>

    <main>
        <section class="hero-section">
            <h1 class="location-name">Ma Station Live</h1>
            <p class="current-date" id="currentDate">--</p>

            <div class="current-weather">
                <div class="weather-icon-large" id="mainIcon">🌡️</div>
                <div class="temperature-display">
                    <div>
                        <span class="temperature" id="tempVal">--</span>
                        <span style="font-size:3rem">°C</span>
                    </div>
                    <div class="weather-description" id="statusMsg">Connexion en cours...</div>
                </div>
            </div>
        </section>

        <section class="weather-details">
            <div class="detail-card">
                <div class="detail-label">💧 Humidité</div>
                <div class="detail-value"><span id="humVal">--</span> %</div>
            </div>
            
            <div class="detail-card">
                <div class="detail-label">☀️ Indice UV (1-100)</div>
                <div class="detail-value" id="uvVal">--</div>
                <div class="uv-bar-container">
                    <div class="uv-fill" id="uvBar"></div>
                </div>
            </div>

            <div class="detail-card">
                <div class="detail-label">🌡️ Pression</div>
                <div class="detail-value"><span id="pressVal">--</span> hPa</div>
            </div>

            <div class="detail-card">
                <div class="detail-label">🌫️ Qualité Air</div>
                <div class="detail-value"><span id="airVal">--</span></div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 — Station de Surveillance STI2D</p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        // CONFIGURATION FIREBASE
        const firebaseConfig = {
            databaseURL: "https://sation-44d19-default-rtdb.europe-west1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Mise à jour date
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('currentDate').textContent = new Date().toLocaleDateString('fr-FR', options);

        // ÉCOUTE DES DONNÉES (BRANCHÉ SUR LA RACINE "/")
        onValue(ref(db, '/'), (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            document.getElementById('statusMsg').textContent = "Données en direct";

            // On vérifie chaque valeur
            if(data.temperature !== undefined) document.getElementById("tempVal").textContent = data.temperature;
            if(data.humidite !== undefined) document.getElementById("humVal").textContent = data.humidite;
            if(data.pression !== undefined) document.getElementById("pressVal").textContent = data.pression;
            if(data.air !== undefined) document.getElementById("airVal").textContent = data.air;

            // Logique UV
            if(data.uv !== undefined) {
                document.getElementById("uvVal").textContent = data.uv;
                document.getElementById("uvBar").style.width = Math.min(data.uv, 100) + "%";
            }
        });
    </script>
</body>
</html>
