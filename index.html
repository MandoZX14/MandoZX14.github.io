<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Station Météo Live</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --accent: #38bdf8;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 { margin-bottom: 30px; font-weight: 300; letter-spacing: 2px; }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 800px;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .card-label { font-size: 0.9rem; color: #94a3b8; margin-bottom: 10px; }
        .card-value { font-size: 1.8rem; font-weight: bold; color: var(--accent); }
        .unit { font-size: 0.9rem; margin-left: 5px; color: #cbd5e1; }

        .mini-bar {
            height: 100%; /* S'adapte au conteneur */
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            overflow: hidden;
        }
        
        /* Conteneur de la barre avec trait blanc */
        .bar-container {
            height: 10px;
            margin-top: 15px;
            border: 1.5px solid white; /* Le trait blanc tout autour */
            border-radius: 10px;
            padding: 1px; /* Espacement léger pour voir le trait */
        }

        .fill { height: 100%; width: 0%; transition: width 1s ease-in-out; }

        /* Couleurs */
        .temp-color { background: linear-gradient(90deg, #f59e0b, #ef4444); }
        .hum-color { background: linear-gradient(90deg, #3b82f6, #06b6d4); }
        
        /* Dégradé UV : Vert -> Jaune -> Orange -> Rouge -> Violet */
        .uv-gradient { 
            background: linear-gradient(90deg, #22c55e, #eab308, #f97316, #ef4444, #a855f7); 
        }

        .air-color { background: linear-gradient(90deg, #10b981, #f59e0b); }
    </style>
</head>
<body>

    <h1>📊 STATION MÉTÉO LIVE</h1>

    <div class="dashboard">
        <div class="card">
            <div class="card-label">🌡️ TEMPÉRATURE</div>
            <div class="card-value"><span id="tempVal">--</span><span class="unit">°C</span></div>
            <div class="bar-container"><div class="fill temp-color" id="tempBar"></div></div>
        </div>

        <div class="card">
            <div class="card-label">💧 HUMIDITÉ</div>
            <div class="card-value"><span id="humVal">--</span><span class="unit">%</span></div>
            <div class="bar-container"><div class="fill hum-color" id="humBar"></div></div>
        </div>

        <div class="card">
            <div class="card-label">☀️ INDICE UV</div>
            <div class="card-value"><span id="uvVal">--</span><span class="unit">/ 100</span></div>
            <div class="bar-container">
                <div class="fill uv-gradient" id="uvBar"></div>
            </div>
        </div>

        <div class="card">
            <div class="card-label">⏱️ PRESSION</div>
            <div class="card-value" style="font-size: 1.4rem;"><span id="pressVal">--</span><span class="unit">hPa</span></div>
            <div class="bar-container"><div class="fill" id="pressBar" style="background:#a78bfa"></div></div>
        </div>

        <div class="card">
            <div class="card-label">🌫️ AIR (AQI)</div>
            <div class="card-value"><span id="airVal">--</span></div>
            <div class="bar-container"><div class="fill air-color" id="airBar"></div></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        const firebaseConfig = {
            databaseURL: "https://sation-44d19-default-rtdb.europe-west1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        onValue(ref(db, 'meteo'), (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            if(data.temperature !== undefined) {
                document.getElementById("tempVal").textContent = data.temperature;
                document.getElementById("tempBar").style.width = Math.min((data.temperature / 45) * 100, 100) + "%";
            }
            if(data.humidite !== undefined) {
                document.getElementById("humVal").textContent = data.humidite;
                document.getElementById("humBar").style.width = data.humidite + "%";
            }
            // MISE À JOUR UV (0 à 100)
            if(data.uv !== undefined) {
                document.getElementById("uvVal").textContent = data.uv;
                document.getElementById("uvBar").style.width = Math.min(data.uv, 100) + "%";
            }
            if(data.pression !== undefined) {
                document.getElementById("pressVal").textContent = data.pression;
                document.getElementById("pressBar").style.width = Math.min(((data.pression - 950) / 100) * 100, 100) + "%";
            }
            if(data.air !== undefined) {
                document.getElementById("airVal").textContent = data.air;
                document.getElementById("airBar").style.width = Math.min(data.air, 100) + "%";
            }
        });
    </script>
</body>
</html>
